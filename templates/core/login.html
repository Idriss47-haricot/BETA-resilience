{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Connexion - BETA-Résilience{% endblock %}

{% block content %}

<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-success text-center">Connexion</h2>
                        <p class="text-muted text-center">Connectez-vous à votre espace membre</p>
                        
                        <form method="post" class="mt-4">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label">Nom d'utilisateur</label>
                                <input type="text" name="username" class="form-control" placeholder="Votre nom d'utilisateur" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" name="password" class="form-control" placeholder="Votre mot de passe" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-sign-in-alt me-2"></i> Se connecter
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <p class="text-muted small">
                                Pas encore membre ? 
                                <a href="{% url 'membres:adhesion' %}" class="text-success">Adhérer maintenant</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
